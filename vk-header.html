<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dilic Clicker - Шапка для VK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0c15 0%, #1a1f2e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* Шапка для VK с закругленными углами */
        .vk-header {
            width: 1590px;
            height: 400px;
            background: linear-gradient(135deg, #0a0c15 0%, #121520 50%, #0a0c15 100%);
            position: relative;
            overflow: hidden;
            border-radius: 32px;
            box-shadow: 0 0 0 1px rgba(255, 215, 0, 0.2), 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Золотые лучи */
        .vk-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 140%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 215, 0, 0.08), transparent 70%);
            pointer-events: none;
            animation: rotateLight 20s linear infinite;
        }

        @keyframes rotateLight {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Содержимое */
        .header-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            padding: 0 80px;
        }

        /* Левая часть - текст */
        .left-section {
            flex: 1;
        }

        .game-title {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .tagline {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .features {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        .feature img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .feature span {
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .feature .emoji {
            font-size: 1.2rem;
        }

        /* Кнопка в Telegram */
        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.05));
            border: 2px solid gold;
            border-radius: 60px;
            padding: 14px 35px;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            animation: btnPulse 2s ease-in-out infinite;
            margin-bottom: 15px;
        }

        .play-btn:hover {
            transform: scale(1.02);
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0.1); }
        }

        .play-btn span {
            font-size: 1.3rem;
            font-weight: 700;
            color: gold;
        }

        .play-btn .arrow {
            font-size: 1.3rem;
            color: gold;
        }

        /* Веб-версия ссылка */
        .web-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 40px;
            padding: 10px 25px;
            text-decoration: none;
            transition: all 0.2s ease;
            color: white;
            font-size: 0.9rem;
        }

        .web-link:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateY(-2px);
            border-color: gold;
        }

        .web-link span {
            color: gold;
        }

        /* Правая часть - анимации */
        .right-section {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        /* Вращающееся колесо */
        .wheel-large {
            width: 180px;
            height: 180px;
            position: relative;
            animation: wheelSpin 4s linear infinite;
        }

        @keyframes wheelSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }

        /* Плавающие иконки */
        .floating-icons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .float-icon {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid gold;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            animation: floatIcon 2.5s ease-in-out infinite;
        }

        .float-icon:nth-child(2) { animation-delay: 0.5s; }
        .float-icon:nth-child(3) { animation-delay: 1s; }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .float-icon img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        /* Золотые искры */
        .gold-spark {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 4s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        /* Адаптация под мобилки (для просмотра) */
        @media (max-width: 1600px) {
            .vk-header {
                width: 100%;
                height: auto;
                min-height: 350px;
            }
            .header-content {
                flex-direction: column;
                padding: 40px 20px;
                gap: 30px;
                text-align: center;
            }
            .left-section {
                text-align: center;
            }
            .features {
                justify-content: center;
            }
            .right-section {
                justify-content: center;
            }
            .game-title {
                font-size: 2.5rem;
            }
            .wheel-large {
                width: 140px;
                height: 140px;
            }
            .float-icon {
                width: 55px;
                height: 55px;
            }
            .float-icon img {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="vk-header">
        <div class="header-content">
            <!-- Левая часть с текстом -->
            <div class="left-section">
                <div class="game-title">🔥 DILIC CLICKER 🔥</div>
                <div class="tagline">КЛИКАЙ • КРУТИ • ПОБЕЖДАЙ</div>
                
                <div class="features">
                    <div class="feature">
                        <img src="https://i.pinimg.com/736x/df/49/fd/df49fd562d564016dcc4070b5e83c521.jpg" alt="Dilicks">
                        <span>Две валюты</span>
                    </div>
                    <div class="feature">
                        <img src="https://avatars.mds.yandex.net/i?id=d2747e92b4fb93d8cee0b3582cb46ea6_l-5332707-images-thumbs&n=13" alt="Money">
                        <span>Магазин скинов</span>
                    </div>
                    <div class="feature">
                        <span class="emoji">🎡</span>
                        <span>Колесо ×250</span>
                    </div>
                    <div class="feature">
                        <span class="emoji">🏆</span>
                        <span>Топ игроков</span>
                    </div>
                    <div class="feature">
                        <span class="emoji">🎁</span>
                        <span>Промокоды</span>
                    </div>
                </div>
                
                <!-- Кнопка в Telegram -->
                <a href="https://t.me/DilicClicker_bot" class="play-btn" target="_blank">
                    <span>🤖</span>
                    <span>ИГРАТЬ В TELEGRAM</span>
                    <span class="arrow">▶</span>
                </a>
                
                <!-- Веб-версия ссылка -->
                <div style="margin-top: 5px;">
                    <a href="https://awrnvx.github.io/dilic-clicker.github.io/" class="web-link" target="_blank">
                        <span>🌐</span>
                        <span>ВЕБ-ВЕРСИЯ</span>
                        <span style="color: rgba(255,255,255,0.6); margin-left: 5px;">awrnvx.github.io/dilic-clicker.github.io</span>
                    </a>
                </div>
            </div>
            
            <!-- Правая часть с анимациями -->
            <div class="right-section">
                <div class="wheel-large" id="wheelLarge">
                    <canvas id="wheelCanvasLarge" width="180" height="180" class="wheel-canvas"></canvas>
                </div>
                <div class="floating-icons">
                    <div class="float-icon">
                        <img src="https://i.pinimg.com/736x/df/49/fd/df49fd562d564016dcc4070b5e83c521.jpg" alt="Dilicks">
                    </div>
                    <div class="float-icon">
                        <img src="https://avatars.mds.yandex.net/i?id=d2747e92b4fb93d8cee0b3582cb46ea6_l-5332707-images-thumbs&n=13" alt="Money">
                    </div>
                    <div class="float-icon">
                        <img src="https://static.wikia.nocookie.net/59310fd4-7c46-4895-930e-6cea7982a142/scale-to-width/755" alt="Skin">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Декоративные искры -->
        <div class="gold-spark" style="top: 30px; left: 10%; width: 80px; height: 80px;"></div>
        <div class="gold-spark" style="bottom: 40px; right: 15%; width: 100px; height: 100px; animation-delay: -1s;"></div>
        <div class="gold-spark" style="top: 60%; left: 5%; width: 60px; height: 60px; animation-delay: -2s;"></div>
        <div class="gold-spark" style="bottom: 20%; right: 30%; width: 70px; height: 70px; animation-delay: -0.5s;"></div>
    </div>

    <script>
        // Рисуем колесо фортуны
        const canvas = document.getElementById('wheelCanvasLarge');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            
            const WHEEL_COLORS = [
                { color: '#2e7d32', percent: 50 },
                { color: '#f9a825', percent: 35 },
                { color: '#ef6c00', percent: 25 },
                { color: '#d32f2f', percent: 15 },
                { color: '#7b1fa2', percent: 5 },
                { color: '#c2185b', percent: 2.5 }
            ];
            
            function drawWheel() {
                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;
                const r = Math.min(w, h) * 0.42;
                
                ctx.clearRect(0, 0, w, h);
                
                let startAngle = 0;
                
                for (let i = 0; i < WHEEL_COLORS.length; i++) {
                    const slice = WHEEL_COLORS[i];
                    const sliceAngle = (slice.percent / 100) * 2 * Math.PI;
                    const endAngle = startAngle + sliceAngle;
                    
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, r, startAngle, endAngle);
                    ctx.closePath();
                    
                    ctx.fillStyle = slice.color;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    startAngle = endAngle;
                }
                
                // Центр
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.18, 0, 2 * Math.PI);
                ctx.fillStyle = 'gold';
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'gold';
                ctx.fill();
                ctx.shadowBlur = 0;
                
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.08, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffaa00';
                ctx.fill();
            }
            
            drawWheel();
            
            // Добавляем указатель
            const wheelContainer = document.querySelector('.wheel-large');
            if (wheelContainer && !wheelContainer.querySelector('.wheel-pointer')) {
                const pointer = document.createElement('div');
                pointer.className = 'wheel-pointer';
                pointer.style.cssText = `
                    position: absolute;
                    top: -12px;
                    left: 50%;
                    transform: translateX(-50%);
                    width: 0;
                    height: 0;
                    border-left: 12px solid transparent;
                    border-right: 12px solid transparent;
                    border-top: 24px solid gold;
                    filter: drop-shadow(0 2px 4px #000);
                    z-index: 10;
                    pointer-events: none;
                `;
                wheelContainer.style.position = 'relative';
                wheelContainer.appendChild(pointer);
            }
        }
    </script>
</body>
</html>
